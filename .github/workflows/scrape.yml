name: Daily Anime Discovery

on:
  schedule:
    - cron: '0 4 * * *'   # Every day at 04:00 UTC
  workflow_dispatch:        # Manual trigger from GitHub UI or API

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install aiohttp

      - name: Run anime ID discovery
        run: python scripts/scrape_ids.py

      - name: Run site discovery
        run: python scripts/scrape_sites.py

      - name: Pull latest before commit
        run: |
          git stash -- api/anime-ids.json api/sites.json
          git pull --rebase origin main
          git stash pop

      - name: Commit updates
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore: daily discovery — IDs + sites [skip ci]'
          file_pattern: api/anime-ids.json api/sites.json
          commit_user_name: 'animedb-bot'
          commit_user_email: 'animedb-bot@users.noreply.github.com'

